<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

     <link rel="stylesheet" href="./styles/login.css">

 
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="card w-[420px] bg-white shadow-xl p-8">

        <div class="flex justify-center mb-4">
            <img src="./assets/github-logo.png" class="w-16" />
        </div>

        <h1 class="text-2xl font-bold text-center">GitHub Issues Tracker</h1>

        <p class="text-center text-gray-500 mb-6">
            Sign in to manage your issues
        </p>

        <form class="space-y-4">

            <div>
                <label class="label">
                    <span class="label-text font-semibold">Username</span>
                </label>

                <input id="input-username" type="text" placeholder="Enter Username" class="input input-bordered w-full" />

                <p class="text-xs text-blue-600 mt-1">Default: admin</p>
            </div>

            <div>
                <label class="label">
                    <span class="label-text font-semibold">Password</span>
                </label>

                <input id="input-password" type="password" placeholder="Enter Password" class="input input-bordered w-full" />

                <p class="text-xs text-blue-600 mt-1">Default: admin123</p>
            </div>

            <button id="login-btn" class="btn btn-primary w-full mt-2">
                Sign In
            </button>

        </form>

        <div class="divider my-6">OR</div>

        <p class="text-center text-sm text-gray-500 mb-2">
            Demo Credentials:
        </p>

        <div class="bg-gray-100 rounded-lg p-4 text-center text-sm">
            <p><strong>Username:</strong> admin</p>
            <p><strong>Password:</strong> admin123</p>
        </div>

    </div>


    <script src="./script/login.js"></script>
    <script src="./script/main.js"></script>
</body>

</html>
